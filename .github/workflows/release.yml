# Cross-platform release build for Eaon (the Tauri app in eaon-tauri/).
#
# WHY THIS EXISTS: Eaon's Windows + Linux builds ARE the Tauri app; the
# flagship macOS app is a separate native SwiftUI project (Eaon-desktop/)
# built with Xcode. This workflow deliberately builds ONLY Windows and Linux
# and never touches the macOS app — the Mac release is produced separately and
# is not this pipeline's job.
#
# It runs on real windows-latest and ubuntu runners (you don't need a Windows
# or Linux PC — this is how you produce and test the installers from a Mac),
# and on a version tag it publishes a DRAFT GitHub Release with every
# platform's installers attached, so nothing goes public until you review and
# press Publish. A matrix build is the documented tauri-action multi-OS
# pattern: it creates the release once (keyed on the tag) and each job uploads
# its own platform's bundles to it.
name: Release (Windows + Linux)

on:
  push:
    tags:
      - "v*" # e.g. git tag v2026.2.0 && git push origin v2026.2.0
  # Manual runs build the installers WITHOUT creating a release — handy for
  # checking the build is green before you cut a real tag.
  workflow_dispatch:

# tauri-action creates the GitHub Release, which needs write access to
# repository contents. (Default GITHUB_TOKEN perms are read-only on many repos.)
permissions:
  contents: write

jobs:
  build:
    strategy:
      # Don't cancel Linux just because Windows failed (or vice versa) — a
      # green build for one OS is still worth shipping.
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: ubuntu-22.04
            label: Linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux (WebKitGTK) system dependencies Tauri needs to bundle. No-op on
      # Windows, which uses the OS's built-in WebView2.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libdbus-1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            pkg-config

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eaon-tauri/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Caches src-tauri/target keyed on Cargo.lock so repeat builds are fast.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: eaon-tauri/src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        working-directory: eaon-tauri
        run: npm ci

      - name: Verify Linux source
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: eaon-tauri
        run: |
          npm run check
          cargo test --manifest-path src-tauri/Cargo.toml

      # On a tag push, stamp the app version from the tag (v2026.2.0 ->
      # 2026.2.0) so the installer's version matches the release, then let
      # tauri-action build + publish. tauri-action runs the config's
      # beforeBuildCommand (npm run build) and bundles per platform:
      # NSIS (.exe) + MSI on Windows; .deb + .AppImage on Linux.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: eaon-tauri
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'),p='src-tauri/tauri.conf.json',j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.argv[1];fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')" "$VERSION"
          echo "Set tauri.conf.json version to $VERSION"

      - name: Build & publish release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: eaon-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Eaon ${{ github.ref_name }}"
          releaseBody: |
            Cross-platform builds of Eaon.

            - **Windows:** download the **`.exe`** installer.
            - **Linux:** download the **`.AppImage`** (portable, runs anywhere) or the **`.deb`** (Debian/Ubuntu).

            **Heads up — these builds are not code-signed yet.** On Windows,
            SmartScreen shows a blue "Windows protected your PC" box: click
            **More info** → **Run anyway**. This is expected for unsigned apps
            and goes away once the app is signed.
          releaseDraft: true # published as a DRAFT — review, then hit Publish
          prerelease: false

      # ---- Manual (workflow_dispatch) path: build only, no release ----
      - name: Build installers only (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: eaon-tauri

      - name: Upload installer artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: eaon-${{ matrix.label }}-installers
          path: |
            eaon-tauri/src-tauri/target/release/bundle/nsis/*.exe
            eaon-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            eaon-tauri/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
